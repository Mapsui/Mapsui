<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 512 512"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Mapsui logo diagonal gradient</title>
  <desc id="desc">
    A purple circle with a cubic diagonal gradient and matching top and bottom cutouts.
  </desc>
  <defs>
    <linearGradient
      id="logo-fill-gradient"
      x1="36"
      y1="36"
      x2="476"
      y2="476"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0%" stop-color="#4D84F2" />
      <stop offset="10%" stop-color="#4F79E4" />
      <stop offset="20%" stop-color="#526ED5" />
      <stop offset="30%" stop-color="#5664C5" />
      <stop offset="40%" stop-color="#595AB4" />
      <stop offset="50%" stop-color="#575094" />
      <stop offset="60%" stop-color="#4F457F" />
      <stop offset="70%" stop-color="#473C6E" />
      <stop offset="80%" stop-color="#40335F" />
      <stop offset="90%" stop-color="#392C53" />
      <stop offset="100%" stop-color="#332548" />
    </linearGradient>
    <mask id="circle-cutout-mask">
      <rect
        width="512"
        height="512"
        fill="#000000"
      />
      <circle
        cx="256"
        cy="256"
        r="220"
        fill="#ffffff"
      />
      <rect
        x="168"
        y="256"
        width="176"
        height="256"
        fill="#000000"
      />
      <path
        d="M168 182.18079 L256 256 L344 182.18079 V256 H168 Z"
        fill="#000000"
      />
      <path
        d="M168 0 V54.366598 L256 128.185808 L344 54.366598 V0 Z"
        fill="#000000"
      />
    </mask>
  </defs>
  <rect
    width="512"
    height="512"
    fill="url(#logo-fill-gradient)"
    mask="url(#circle-cutout-mask)"
  />
</svg>
